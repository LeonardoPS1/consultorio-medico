, "target": "lib_utils_cn", "relation": "calls"}, {"source": "ui_dialog_dialogfooter", "target": "lib_utils_cn", "relation": "calls"}, {"source": "aicoremed", "target": "postgresql_16", "relation": "references"}, {"source": "aicoremed", "target": "drizzle_orm", "relation": "references"}, {"source": "aicoremed", "target": "framer_motion", "relation": "references"}, {"source": "assets_dashboard_real_home_page", "target": "layout_sidebar_navigation", "relation": "conceptually_related_to"}, {"source": "assets_dashboard_real_turnos_page", "target": "layout_sidebar_navigation", "relation": "conceptually_related_to"}, {"source": "layout_sidebar_navigation", "target": "assets_dashboard_real_turnos_page", "relation": "calls"}, {"source": "layout_sidebar_navigation", "target": "assets_dashboard_real_home_page", "relation": "calls"}, {"source": "assets_dashboard_real_home_page", "target": "assets_dashboard_real_turnos_page", "relation": "semantically_similar_to"}];

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#container").append("svg")
  .attr("width", width).attr("height", height);

const g = svg.append("g");

const zoom = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);
svg.call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2));

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(edges).id(d => d.id).distance(60))
  .force("charge", d3.forceManyBody().strength(-80))
  .force("center", d3.forceCenter(0, 0))
  .force("collision", d3.forceCollide(12));

const link = g.append("g").selectAll("line")
  .data(edges).join("line")
  .attr("stroke", "#30363d").attr("stroke-width", 0.5).attr("stroke-opacity", 0.3);

const node = g.append("g").selectAll("circle")
  .data(nodes).join("circle")
  .attr("r", d => d.type === "concept" ? 6 : d.type === "document" ? 5 : d.type === "image" ? 4 : 3.5)
  .attr("fill", d => d.color)
  .attr("stroke", "#161b22").attr("stroke-width", 0.5)
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end", (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
  );

const label = g.append("g").selectAll("text")
  .data(nodes.filter(d => d.type === "concept" || d.type === "document"))
  .join("text")
  .text(d => d.label).attr("font-size", 8).attr("fill", "#8b949e")
  .attr("dx", 6).attr("dy", 3);

node.append("title").text(d => d.label + "\n" + (d.source_file || ""));

simulation.on("tick", () => {
  link.attr("x1", d=>d.source.x).attr("y1", d=>d.source.y)
      .attr("x2", d=>d.target.x).attr("y2", d=>d.target.y);
  node.attr("cx", d=>d.x).attr("cy", d=>d.y);
  label.attr("x", d=>d.x).attr("y", d=>d.y);
});

// Search
d3.select("#searchInput").on("input", function() {
  const q = this.value.toLowerCase();
  node.attr("opacity", d => d.label.toLowerCase().includes(q) || !q ? 1 : 0.1)
      .attr("r", d => d.label.toLowerCase().includes(q) ? 8 : d.type === "concept" ? 6 : d.type === "document" ? 5 : 3.5);
  label.attr("opacity", d => d.label.toLowerCase().includes(q) || !q ? 1 : 0);
});
</script>
