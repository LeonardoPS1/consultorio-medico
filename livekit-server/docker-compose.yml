version: "3.8"

services:
  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${LIVEKIT_REDIS_PASSWORD}
    environment:
      LIVEKIT_REDIS_PASSWORD: ${LIVEKIT_REDIS_PASSWORD:-v4iysnslnjdzdiawuzscn70ji8cotsyv}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LIVEKIT_REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - livekit
      - dokploy-network

  # ─── LiveKit Server ───────────────────────────────────
  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    ports:
      # HTTP / WebSocket (for Traefik proxying)
      - "7880:7880/tcp"
      # Optional direct WSS (for clients that bypass Traefik)
      - "7881:7881/tcp"
      # UDP range for media (audio/video)
      - "50000-60000:50000-60000/udp"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    networks:
      - livekit
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:7880/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  redis_data:

networks:
  livekit:
    driver: bridge
  dokploy-network:
    external: true
