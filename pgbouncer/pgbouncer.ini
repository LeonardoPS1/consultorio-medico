; =============================================================================
; pgbouncer.ini — Pool de conexiones PostgreSQL
;
; Ubicación: /etc/pgbouncer/pgbouncer.ini (dentro del contenedor)
;
; Modo SESSION: cada conexión cliente ocupa una conexión backend dedicada
; durante toda su duración. Es el modo más compatible (prepared statements,
; SET, temp tables, etc. funcionan sin problemas).
;
; Se puede cambiar a TRANSACTION para mayor eficiencia si se verifica
; que postgres.js no usa features de sesión.
; =============================================================================

[databases]
; Mapeo: nombre_db_cliente = host=backend port=5432 dbname=nombre_real
consultorio_medico = host=postgres port=5432 dbname=consultorio_medico

[pgbouncer]

; ─── Listen ───────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432

; ─── Auth ─────────────────────────────────────────────────────────────────────
; trust = sin contraseña (solo redes internas Docker)
; md5   = contraseña hasheada (requiere userlist.txt con pass en texto plano)
; scram-sha-256 = más seguro (producción)
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt

; ─── Pooling ──────────────────────────────────────────────────────────────────
; session  = (recomendado) compatible con prepared statements y SET
; transaction = más eficiente, requiere que el driver no use features de sesión
pool_mode = session

; Conexiones backend máximas POR database (a PostgreSQL real)
default_pool_size = 20

; Conexiones cliente máximas (apps que se conectan a pgBouncer)
max_client_conn = 60

; Conexiones backend máximas totales (limita uso de PG)
max_db_connections = 20

; ─── Timeouts ─────────────────────────────────────────────────────────────────
; Conexión backend idle se cierra tras este tiempo (segundos)
server_idle_timeout = 300

; Conexión cliente idle se cierra tras este tiempo (segundos)
client_idle_timeout = 600

; Transacción idle se cancela tras este tiempo (segundos)
idle_transaction_timeout = 60

; Query que tarda más de esto se cancela (segundos, 0 = desactivado)
query_timeout = 30

; ─── Misc ─────────────────────────────────────────────────────────────────────
; Intervalo de estadísticas (segundos)
stats_period = 60

; Desactivado para evitar leaks de info
application_name_add_host = 0

; Log de conexiones/desconexiones
verbose = 0

; Archivo de log (opcional, por defecto stderr dentro del contenedor)
; logfile = /var/log/pgbouncer/pgbouncer.log
