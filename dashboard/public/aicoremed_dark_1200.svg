<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <title>AiCoreMed logo oscuro 1200x1200</title>
  <defs>
    <clipPath id="sq-dark"><rect x="100" y="100" width="1000" height="1000" rx="80"/></clipPath>
  </defs>

  <!-- Fondo oscuro -->
  <rect x="100" y="100" width="1000" height="1000" rx="80" fill="#0C1E30"/>

  <!-- Pulso ECG -->
  <g clip-path="url(#sq-dark)">
    <polyline
      points="
        150,600
        440,600
        456,578
        472,622
        484,560
        498,640
        510,582
        522,610
        534,600
        630,600
        720,600
        748,490
        776,710
        794,424
        812,776
        826,528
        844,652
        860,600
        1000,600
        1050,600
      "
      fill="none" stroke="#5DCAA5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  </g>

  <!-- "Ai" teal -->
  <text
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="116"
    font-weight="300"
    fill="#5DCAA5"
    x="280"
    y="635"
    letter-spacing="-2">Ai</text>

  <!-- "CoreMed" blanco -->
  <text
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="116"
    font-weight="700"
    fill="#ffffff"
    x="388"
    y="635"
    letter-spacing="-3">CoreMed</text>

  <!-- Tagline -->
  <text
    x="600"
    y="718"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="28"
    font-weight="700"
    fill="#85B7EB"
    letter-spacing="5">GESTIÓN MÉDICA INTELIGENTE</text>

</svg>
