<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <title>AiCoreMed logo claro 1200x1200</title>
  <defs>
    <clipPath id="sq-light"><rect x="100" y="100" width="1000" height="1000" rx="80"/></clipPath>
  </defs>

  <!-- Fondo -->
  <rect x="100" y="100" width="1000" height="1000" rx="80" fill="#ffffff" stroke="#DDE8F5" stroke-width="2"/>

  <!-- Pulso ECG — línea base y=600, picos desde x=720 (letra M) -->
  <g clip-path="url(#sq-light)">
    <polyline
      points="
        150,600
        440,600
        456,578
        472,622
        484,560
        498,640
        510,582
        522,610
        534,600
        630,600
        720,600
        748,490
        776,710
        794,424
        812,776
        826,528
        844,652
        860,600
        1000,600
        1050,600
      "
      fill="none" stroke="#378ADD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.22"/>
  </g>

  <!-- Logotipo: "Ai" + "CoreMed" centrado en x=600, baseline y=630 -->
  <!-- Medida estimada: "Ai" ~110px, "CoreMed" ~530px, total ~640px → inicio x=280 -->
  <text
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="116"
    font-weight="300"
    fill="#1D9E75"
    x="280"
    y="635"
    letter-spacing="-2">Ai</text>

  <text
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="116"
    font-weight="700"
    fill="#0C2D4E"
    x="388"
    y="635"
    letter-spacing="-3">CoreMed</text>

  <!-- Tagline centrada -->
  <text
    x="600"
    y="718"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="28"
    font-weight="700"
    fill="#185FA5"
    letter-spacing="5">GESTIÓN MÉDICA INTELIGENTE</text>

</svg>
