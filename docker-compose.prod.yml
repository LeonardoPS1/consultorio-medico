version: '3.8'

# ─── Secreto compartido para x-webhook-secret ──────────────
# Crear en Swarm:
#   echo "mi-secreto-aqui" | docker secret create n8n_webhook_secret -
#   echo "${DB_PASSWORD}" | docker secret create db_password -
#   echo "${N8N_DB_PASSWORD}" | docker secret create n8n_db_password -
#   echo "${DATABASE_URL}" | docker secret create database_url -
#
# Para desarrollo sin Swarm: usar env_file (Dokploy compatible)
# ─────────────────────────────────────────────────────────

services:
  dashboard:
    image: ghcr.io/leonardops1/consultorio-medico-dashboard:latest
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # ⚠️ Dokploy usa env_file para las variables de entorno.
    # En producción con Swarm puro, reemplazar por secrets:
    # env_file:
    #   - ./dashboard/.env
    secrets:
      - database_url
      - n8n_webhook_secret
      - twilio_account_sid
      - twilio_auth_token
      - mercadopago_webhook_secret
      - auth_secret
    environment:
      - NODE_ENV=production
      - TZ=America/Santiago
    depends_on:
      - postgres
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        order: stop-first
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker

  postgres:
    image: postgres:16-alpine
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=consultorio_medico
      - POSTGRES_USER=dashboard_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - TZ=America/Santiago
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dashboard_user -d consultorio_medico']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  n8n:
    image: n8nio/n8n:latest
    ports:
      - target: 5678
        published: 5678
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - N8N_HOST=n8n.aicorebots.com
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.aicorebots.com
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - TZ=America/Santiago
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  redis:
    image: redis:7-alpine
    ports:
      - target: 6379
        published: 6379
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  docs:
    build:
      context: ./docs-site/aicoremed-docs
      dockerfile: Dockerfile
    image: ghcr.io/leonardops1/consultorio-medico-docs:latest
    ports:
      - target: 80
        published: 8080
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.1'
          memory: 32M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker

  ollama:
    image: ollama/ollama:latest
    ports:
      - target: 11434
        published: 11434
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == true
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

secrets:
  database_url:
    external: true
  n8n_webhook_secret:
    external: true
  twilio_account_sid:
    external: true
  twilio_auth_token:
    external: true
  mercadopago_webhook_secret:
    external: true
  auth_secret:
    external: true

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
