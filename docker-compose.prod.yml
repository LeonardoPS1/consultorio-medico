version: '3.8'

# ─── Secreto compartido para x-webhook-secret ──────────────
# Crear en Swarm:
#   echo "mi-secreto-aqui" | docker secret create n8n_webhook_secret -
#   echo "${DB_PASSWORD}" | docker secret create db_password -
#   echo "${N8N_DB_PASSWORD}" | docker secret create n8n_db_password -
#   echo "${DATABASE_URL}" | docker secret create database_url -
#
# Para desarrollo sin Swarm: usar env_file (Dokploy compatible)
# ─────────────────────────────────────────────────────────

services:
  dashboard:
    image: ghcr.io/leonardops1/consultorio-medico-dashboard:latest
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # ⚠️ Dokploy usa env_file para las variables de entorno.
    # En producción con Swarm puro, reemplazar por secrets:
    # env_file:
    #   - ./dashboard/.env
    secrets:
      - database_url
      - n8n_webhook_secret
      - twilio_account_sid
      - twilio_auth_token
      - mercadopago_webhook_secret
      - auth_secret
    environment:
      - NODE_ENV=production
      - TZ=America/Santiago
    depends_on:
      - postgres
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        order: stop-first
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker

  postgres:
    image: postgres:16-alpine
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=consultorio_medico
      - POSTGRES_USER=dashboard_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - TZ=America/Santiago
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dashboard_user -d consultorio_medico']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    ports:
      - target: 6432
        published: 6432
        protocol: tcp
        mode: host
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=dashboard_user
      - DB_PASSWORD=${DB_PASSWORD}
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
    depends_on:
      - postgres
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
      restart_policy:
        condition: any

  n8n:
    image: n8nio/n8n:latest
    ports:
      - target: 5678
        published: 5678
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - N8N_HOST=n8n.aicorebots.com
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.aicorebots.com
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - TZ=America/Santiago
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=dashboard_user
      - PGDATABASE=consultorio_medico
    volumes:
      - n8n_data:/home/node/.n8n
      - ./scripts:/opt/consultorio/scripts:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  redis:
    image: redis:7-alpine
    ports:
      - target: 6379
        published: 6379
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  docs:
    build:
      context: ./docs-site/aicoremed-docs
      dockerfile: Dockerfile
    image: ghcr.io/leonardops1/consultorio-medico-docs:latest
    ports:
      - target: 80
        published: 8080
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.1'
          memory: 32M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker

  metabase:
    image: metabase/metabase:latest
    ports:
      - target: 3000
        published: 3001
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    secrets:
      - metabase_db_password
      - metabase_encryption_key
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_HOST=postgres
      - MB_DB_PORT=5432
      - MB_DB_DBNAME=metabase
      - MB_DB_USER=metabase_user
      - MB_DB_PASS_FILE=/run/secrets/metabase_db_password
      - MB_ENCRYPTION_SECRET_KEY_FILE=/run/secrets/metabase_encryption_key
      - JAVA_TIMEZONE=America/Santiago
      - MUID=1000
      - MGID=1000
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - postgres
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 120s

  whisper:
    image: ghcr.io/ggerganov/whisper.cpp:latest
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - whisper_models:/root/.cache/whisper
      - recordings:/recordings
    command: ["--server", "--host", "0.0.0.0", "--port", "8000", "--model", "small"]
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  ollama:
    image: ollama/ollama:latest
    ports:
      - target: 11434
        published: 11434
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == true
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

  chatwoot:
    image: chatwoot/chatwoot:latest
    ports:
      - target: 3000
        published: 3002
        protocol: tcp
        mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - DATABASE_URL=postgres://chatwoot_user:${CHATWOOT_DB_PASSWORD}@postgres:5432/chatwoot
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY_BASE=${CHATWOOT_SECRET_KEY}
      - FRONTEND_URL=https://chatwoot.aicorebots.com
      - NODE_ENV=production
      - RAILS_ENV=production
      - DEFAULT_LOCALE=es
      - ENABLE_MAPBOX=false
      - ACTIVE_STORAGE_SERVICE=local
      - INSTALLATION_ENV=docker
      - TZ=America/Santiago
    volumes:
      - chatwoot_data:/app/storage
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 120s

  backup-agent:
    image: alpine:3.20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - GPG_RECIPIENT=admin@consultorio.com
      - BACKUP_DIR=/backup
      - RETENTION_DAYS=30
      - TZ=America/Santiago
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scripts:/opt/consultorio/scripts:ro
      - backup_agent_data:/backup
      - backup_agent_gnupg:/root/.gnupg
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache docker-cli gpg bash curl >/dev/null 2>&1
        echo "[backup-agent] Importando GPG key si existe..."
        if [ -f /opt/consultorio/scripts/gpg-key.asc ]; then
          gpg --batch --import /opt/consultorio/scripts/gpg-key.asc 2>/dev/null || true
        fi
        echo "[backup-agent] Iniciado. Esperando hora de backup..."
        while true; do
          HOUR=$$(date +%H)
          MIN=$$(date +%M)
          if [ "$$HOUR" = "03" ] && [ "$$MIN" = "15" ]; then
            echo "[backup-agent] === Iniciando backup de volúmenes ==="
            bash /opt/consultorio/scripts/backup-volumenes.sh /backup
            echo "[backup-agent] === Backup completado, esperando 24h ==="
            sleep 60
          fi
          sleep 30
        done
    healthcheck:
      test: ['CMD', 'pgrep', '-f', 'sleep 30']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

secrets:
  database_url:
    external: true
  n8n_webhook_secret:
    external: true
  twilio_account_sid:
    external: true
  twilio_auth_token:
    external: true
  mercadopago_webhook_secret:
    external: true
  auth_secret:
    external: true
  metabase_db_password:
    external: true
  metabase_readonly_password:
    external: true
  metabase_encryption_key:
    external: true

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  whisper_models:
    driver: local
  recordings:
    driver: local
  metabase_data:
    driver: local
  chatwoot_data:
    driver: local
  backup_agent_data:
    driver: local
  backup_agent_gnupg:
    driver: local
