name: Build & Deploy to ghcr.io

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs-site/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - Environment Info
        shell: bash
        run: |
          echo "=== Environment ==="
          env | grep -E '^(GITHUB|DOCKER|RUNNER)' || true
          echo "=== Docker Info ==="
          docker version
          echo "=== Build Context ==="
          ls -laR

      - name: Set lowercase repository name
        run: echo "REPOSITORY_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPOSITORY_LC }}:latest
            ghcr.io/${{ env.REPOSITORY_LC }}:${{ github.sha }}
          platforms: linux/amd64

      - name: Trigger Dokploy deploy (dashboard) via Dashboard proxy
        run: |
          curl -s -k -X POST 'https://med.aicorebots.com/api/deploy/dokploy' \
            -H 'accept: application/json' \
            -H 'x-api-key: ${{ secrets.DOKPLOY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"applicationId":"${{ secrets.DOKPLOY_APP_ID }}"}'
