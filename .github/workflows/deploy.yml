name: Build & Deploy to ghcr.io

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs-site/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            CACHEBUST=${{ github.run_id }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.run_number }}

      - name: Trigger Dokploy deploy via Dashboard proxy
        run: |
          curl -s -k -X POST 'https://med.aicorebots.com/api/deploy/dokploy' \
            -H 'accept: application/json' \
            -H 'x-api-key: ${{ secrets.DOKPLOY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"applicationId":"${{ secrets.DOKPLOY_DASHBOARD_APP_ID }}"}'

  docs-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docs image
        uses: docker/build-push-action@v5
        with:
          context: ./docs-site/aicoremed-docs
          file: ./docs-site/aicoremed-docs/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-docs:latest
            ghcr.io/${{ github.repository }}-docs:${{ github.sha }}

      - name: Trigger Dokploy deploy (docs) via Dashboard proxy
        run: |
          curl -s -k -X POST 'https://med.aicorebots.com/api/deploy/dokploy' \
            -H 'accept: application/json' \
            -H 'x-api-key: ${{ secrets.DOKPLOY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"applicationId":"${{ secrets.DOKPLOY_DOCS_APP_ID }}"}'
